<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vocabulary Mastery</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div class="app-container">
        <header class="header">
            <div class="logo">
                <div class="logo-icon">V</div>
                <h1>Vocab Mastery</h1>
            </div>

            <div class="controls-container">
                <div class="search-bar">
                    <svg class="search-icon" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24"
                        stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                            d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z" />
                    </svg>
                    <input type="text" id="searchInput" placeholder="Search words or meanings...">
                </div>

                <div class="filter-tabs" id="filterTabs">
                    <button class="tab-btn active" data-filter="all">All Words</button>
                    <button class="tab-btn" data-filter="333">Barron's 333</button>
                    <button class="tab-btn" data-filter="800">Barron's 800</button>
                    <button class="tab-btn" data-filter="memorized">Checklist</button>
                </div>
            </div>
        </header>

        <main class="main-content">
            <div id="loadingIndicator" class="loading">
                <div class="spinner"></div>
                <p>Loading words database...</p>
            </div>

            <div class="results-info" id="resultsInfo" style="display: none;">
                <div>Showing <span id="showingCount">0</span> words</div>
                <button id="resetChecklistBtn"
                    style="display:none; padding:0.4rem 1rem; background:var(--accent); color:white; border:none; border-radius:8px; cursor:pointer; font-weight:600; font-size:0.9rem; transition:opacity 0.2s;">Reset
                    Checklist</button>
            </div>

            <div class="word-grid" id="wordGrid">
                <!-- Word cards will be injected here via JavaScript -->
            </div>

            <div class="pagination-container" id="pagination" style="display: none;">
                <button class="page-btn" id="prevBtn" disabled>
                    <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none"
                        stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <polyline points="15 18 9 12 15 6"></polyline>
                    </svg>

                </button>
                <div class="page-info" id="pageInfo">Page 1 of 1</div>
                <button class="page-btn" id="nextBtn">

                    <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none"
                        stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <polyline points="9 18 15 12 9 6"></polyline>
                    </svg>
                </button>
            </div>
        </main>

        <footer class="footer-section">
            Developed by <strong>Nayan</strong>
            <div class="footer-links">
                <a href="https://github.com/onlynayan" target="_blank" rel="noopener noreferrer" class="github-link">
                    <svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24"
                        fill="currentColor">
                        <path fill-rule="evenodd" clip-rule="evenodd"
                            d="M12 2C6.475 2 2 6.475 2 12a9.994 9.994 0 0 0 6.838 9.488c.5.087.687-.213.687-.476 0-.237-.013-1.024-.013-1.862-2.512.463-3.162-.612-3.362-1.175-.113-.288-.6-1.175-1.025-1.413-.35-.187-.85-.65-.013-.662.788-.013 1.35.725 1.538 1.025.9 1.512 2.338 1.087 2.912.825.088-.65.35-1.087.638-1.337-2.225-.25-4.55-1.113-4.55-4.938 0-1.088.387-1.987 1.025-2.688-.1-.25-.45-1.275.1-2.65 0 0 .837-.262 2.75 1.026a9.28 9.28 0 0 1 2.5-.338c.85 0 1.7.112 2.5.337 1.912-1.3 2.75-1.024 2.75-1.024.55 1.375.2 2.4.1 2.65.637.7 1.025 1.587 1.025 2.687 0 3.838-2.337 4.688-4.562 4.938.362.312.675.912.675 1.85 0 1.337-.013 2.412-.013 2.75 0 .262.188.574.688.474A10.016 100.016 0 0 0 22 12c0-5.525-4.475-10-10-10z" />
                    </svg>
                    <span>@onlynayan</span>
                </a>
            </div>
        </footer>
    </div>

    <button id="scrollToTopBtn" aria-label="Scroll to Top"
        style="display: none; position: fixed; bottom: 2rem; right: 2rem; background: var(--primary); color: white; border: none; border-radius: 50%; width: 50px; height: 50px; cursor: pointer; align-items: center; justify-content: center; box-shadow: 0 4px 15px rgba(0,0,0,0.4); z-index: 1000; transition: transform 0.2s, background 0.3s;"
        onmouseover="this.style.background='var(--primary-hover)'; this.style.transform='scale(1.1)';"
        onmouseout="this.style.background='var(--primary)'; this.style.transform='scale(1)';">
        <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" fill="none" viewBox="0 0 24 24"
            stroke="currentColor" stroke-width="2.5">
            <path stroke-linecap="round" stroke-linejoin="round" d="M5 15l7-7 7 7" />
        </svg>
    </button>

    <script src="words_data.js"></script>
    <script src="script.js"></script>
</body>

</html>
